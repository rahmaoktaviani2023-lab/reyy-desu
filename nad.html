<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for you</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5e6f0 0%, #ffe6f0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Georgia', 'Times New Roman', serif;
            padding: 20px;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            padding: 30px 25px 40px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .photo-frame {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #ffb6c1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: #fce4ec;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* temporary placeholder if no image */
        .photo-placeholder {
            width: 100%;
            height: 100%;
            background: #ffcdd2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e91e63;
            font-size: 14px;
            text-align: center;
        }

        .greeting {
            font-size: 26px;
            font-weight: 600;
            color: #e91e63;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .message {
            font-size: 18px;
            line-height: 1.7;
            color: #6b4c5a;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .message p {
            margin: 12px 0;
        }

        .heart {
            font-size: 40px;
            color: #ff6b8b;
            animation: pulse 1.5s ease infinite;
            margin: 15px 0;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .signature {
            font-size: 16px;
            color: #b5838d;
            border-top: 1px solid #ffe0e7;
            padding-top: 20px;
            margin-top: 10px;
            font-style: italic;
        }

        .small-note {
            font-size: 13px;
            color: #d4a5b3;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- foto section - kamu tinggal tambahin src gambar di sini -->
        <div class="photo-frame">
            <img src="foto.jpg" alt="your photo" id="userPhoto" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="photo-placeholder" style="display: none;">+ add your photo here</div>
        </div>

        <!-- kata kata buat perempuan ku -->
        <div class="greeting">
            for you, my girl
        </div>

        <div class="message">
            <p>you are the reason my days feel softer,</p>
            <p>the quiet kind of beautiful that stays.</p>
            <p>every little thing you do makes my world better,</p>
            <p>even without trying.</p>
            <p>thank you for just being you.</p>
        </div>

        <div class="heart">
            ❤️
        </div>

        <div class="signature">
            always, for you
        </div>
        <div class="small-note">
            you mean more than words can say
        </div>
    </div>

    <script>
        // small helper so you can easily replace image src later
        // kamu tinggal ganti 'your-image.jpg' dengan nama file poto kamu
        // contoh: 'foto-cantik.jpg' atau 'gambar/putri.png'
        const imageElement = document.getElementById('userPhoto');
        // ganti src di bawah ini dengan poto kamu
        imageElement.src = 'foto.jpg';  // <-- ganti ini dengan nama file poto kamu
        
        // if image fails to load, show placeholder text
        imageElement.onerror = function() {
            this.style.display = 'none';
            this.nextElementSibling.style.display = 'flex';
        };
    </script>
</body>
</html>
